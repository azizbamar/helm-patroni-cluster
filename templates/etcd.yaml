{{- if .Values.etcd.enabled }}
# ── etcd Headless Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-etcd-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
---
# ── etcd Client Service ────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-etcd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 2379
      targetPort: 2379
  selector:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
---
# ── etcd StatefulSet ───────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-etcd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "patroni-cluster.fullname" . }}-etcd-headless
  replicas: {{ .Values.etcd.replicaCount }}
  selector:
    matchLabels:
      {{- include "patroni-cluster.etcdLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "patroni-cluster.etcdLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: etcd
          image: "{{ .Values.etcd.image.repository }}:{{ .Values.etcd.image.tag }}"
          imagePullPolicy: {{ .Values.etcd.image.pullPolicy }}
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCD_NAME
              value: "$(POD_NAME)"
            - name: ETCD_DATA_DIR
              value: /var/run/etcd/default.etcd
            - name: ETCD_LISTEN_CLIENT_URLS
              value: http://0.0.0.0:2379
            - name: ETCD_LISTEN_PEER_URLS
              value: http://0.0.0.0:2380
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://$(POD_NAME).{{ include "patroni-cluster.fullname" . }}-etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2379"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://$(POD_NAME).{{ include "patroni-cluster.fullname" . }}-etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2380"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "patroni-etcd-cluster"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_INITIAL_CLUSTER
              value: >-
                {{- $fullname := include "patroni-cluster.fullname" . -}}
                {{- $ns := .Release.Namespace -}}
                {{- $count := int .Values.etcd.replicaCount -}}
                {{- $members := list -}}
                {{- range $i := until $count -}}
                  {{- $members = append $members (printf "%s-etcd-%d=http://%s-etcd-%d.%s-etcd-headless.%s.svc.cluster.local:2380" $fullname $i $fullname $i $fullname $ns) -}}
                {{- end -}}
                {{ join "," $members }}
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "8589934592"
          resources:
            {{- toYaml .Values.etcd.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - etcdctl endpoint health
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - etcdctl endpoint health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: etcd-data
              mountPath: /var/run/etcd
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.etcd.storage.storageClass }}
        storageClassName: {{ .Values.etcd.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.etcd.storage.size }}
{{- end }}
