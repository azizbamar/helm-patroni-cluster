{{- if .Values.etcd.enabled }}
{{- $fullname := include "patroni-cluster.fullname" . }}
{{- $ns := .Release.Namespace }}
{{- $count := int .Values.etcd.replicaCount }}
{{- $members := list }}
{{- range $i := until $count }}
{{- $members = append $members (printf "%s-etcd-%d=http://%s-etcd-%d.%s-etcd-headless.%s.svc.cluster.local:2380" $fullname $i $fullname $i $fullname $ns) }}
{{- end }}
{{- $initialCluster := join "," $members }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-etcd-headless
  namespace: {{ $ns }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-etcd
  namespace: {{ $ns }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 2379
      targetPort: 2379
  selector:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-etcd
  namespace: {{ $ns }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-etcd-headless
  replicas: {{ .Values.etcd.replicaCount }}
  selector:
    matchLabels:
      {{- include "patroni-cluster.etcdLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "patroni-cluster.etcdLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: etcd
          image: "{{ .Values.etcd.image.repository }}:{{ .Values.etcd.image.tag }}"
          imagePullPolicy: {{ .Values.etcd.image.pullPolicy }}
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          command:
            - etcd
            - --name=$(POD_NAME)
            - --data-dir=/var/run/etcd/default.etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://$(POD_NAME).{{ $fullname }}-etcd-headless.{{ $ns }}.svc.cluster.local:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://$(POD_NAME).{{ $fullname }}-etcd-headless.{{ $ns }}.svc.cluster.local:2380
            - --initial-cluster-token=patroni-etcd
            - --initial-cluster={{ $initialCluster }}
            - --initial-cluster-state=new
            - --auto-compaction-retention=1
            - --enable-v2=true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCDCTL_API
              value: "3"
          resources:
            {{- toYaml .Values.etcd.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /version
              port: 2379
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /version
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: etcd-data
              mountPath: /var/run/etcd
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.etcd.storage.storageClass }}
        storageClassName: {{ .Values.etcd.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.etcd.storage.size }}
{{- end }}
