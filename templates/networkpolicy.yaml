{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "patroni-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "patroni-cluster.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedNamespaceLabels }}
        - namespaceSelector:
            matchLabels:
              {{ .key }}: {{ .value }}
        {{- end }}
        - podSelector:
            matchLabels:
              {{- include "patroni-cluster.selectorLabels" $ | nindent 14 }}
      ports:
        - port: 5432
    - from:
        - podSelector: {}
      ports:
        - port: 8008
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "patroni-cluster.etcdLabels" . | nindent 14 }}
      ports:
        - port: 2379
    - to:
        - podSelector:
            matchLabels:
              {{- include "patroni-cluster.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
        - port: 8008
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-etcd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.etcdLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "patroni-cluster.etcdLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "patroni-cluster.selectorLabels" . | nindent 14 }}
      ports:
        - port: 2379
    - from:
        - podSelector:
            matchLabels:
              {{- include "patroni-cluster.etcdLabels" . | nindent 14 }}
      ports:
        - port: 2379
        - port: 2380
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "patroni-cluster.etcdLabels" . | nindent 14 }}
      ports:
        - port: 2379
        - port: 2380
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
