# ── Headless Service (for StatefulSet DNS) ─────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: postgresql
      port: 5432
    - name: patroni-api
      port: 8008
  selector:
    {{- include "patroni-cluster.selectorLabels" . | nindent 4 }}
---
# ── Primary Service — selects all patroni pods (Spilo sets endpoint via API) ──
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-primary
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.primary.type }}
  ports:
    - name: postgresql
      port: {{ .Values.service.primary.port }}
      targetPort: 5432
  selector:
    {{- include "patroni-cluster.selectorLabels" . | nindent 4 }}
---
# ── Replica Service ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-replica
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.replica.type }}
  ports:
    - name: postgresql
      port: {{ .Values.service.replica.port }}
      targetPort: 5432
  selector:
    {{- include "patroni-cluster.selectorLabels" . | nindent 4 }}
---
# ── Patroni REST API Service ────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - name: patroni-api
      port: {{ .Values.service.api.port }}
      targetPort: 8008
  selector:
    {{- include "patroni-cluster.selectorLabels" . | nindent 4 }}
