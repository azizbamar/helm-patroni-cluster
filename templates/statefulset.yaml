apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "patroni-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "patroni-cluster.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "patroni-cluster.selectorLabels" . | nindent 6 }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "patroni-cluster.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "patroni-cluster.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      initContainers:
        # Wait for etcd to be ready before starting Patroni
        - name: wait-for-etcd
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "patroni-cluster.fullname" . }}-etcd.{{ .Release.Namespace }}.svc.cluster.local 2379; do
                echo "Waiting for etcd..."; sleep 3;
              done
              echo "etcd is ready"
      containers:
        - name: patroni
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: postgresql
              containerPort: 5432
            - name: patroni-api
              containerPort: 8008
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patroni-cluster.fullname" . }}-credentials
                  key: POSTGRES_PASSWORD
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patroni-cluster.fullname" . }}-credentials
                  key: REPLICATION_PASSWORD
            - name: PATRONI_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patroni-cluster.fullname" . }}-credentials
                  key: PATRONI_SUPERUSER_PASSWORD
            - name: PATRONI_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patroni-cluster.fullname" . }}-credentials
                  key: PATRONI_REPLICATION_PASSWORD
            - name: PATRONI_KUBERNETES_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: PATRONI_KUBERNETES_LABELS
              value: "{app.kubernetes.io/name: {{ include "patroni-cluster.name" . }}}"
            - name: PATRONI_SCOPE
              value: {{ .Values.patroni.scope }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          command:
            - /bin/bash
            - -c
            - |
              # Substitute environment variables into config
              export PATRONI_CONFIG=/etc/patroni/patroni.yaml
              envsubst < /etc/patroni-config/patroni.yaml > $PATRONI_CONFIG
              exec patroni $PATRONI_CONFIG
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: patroni-config
              mountPath: /etc/patroni-config
            - name: patroni-run
              mountPath: /etc/patroni
      volumes:
        - name: patroni-config
          configMap:
            name: {{ include "patroni-cluster.fullname" . }}-config
        - name: patroni-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: pgdata
        labels:
          {{- include "patroni-cluster.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
