apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "patroni-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "patroni-cluster.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "patroni-cluster.selectorLabels" . | nindent 6 }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "patroni-cluster.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "patroni-cluster.serviceAccountName" . }}
      securityContext:
        fsGroup: 103
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-etcd
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "patroni-cluster.fullname" . }}-etcd.{{ .Release.Namespace }}.svc.cluster.local 2379; do
                echo "Waiting for etcd..."; sleep 3;
              done
              echo "etcd is ready"
      containers:
        - name: patroni
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
            - name: patroni-api
              containerPort: 8008
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Spilo / Patroni core
            - name: SCOPE
              value: {{ .Values.patroni.scope }}
            - name: PGROOT
              value: /home/postgres/pgdata/pgroot
            - name: PGDATA
              value: /home/postgres/pgdata/pgroot/data
            # etcd DCS
            - name: ETCD3_HOSTS
              value: "{{ include "patroni-cluster.fullname" . }}-etcd.{{ .Release.Namespace }}.svc.cluster.local:2379"
            # Superuser
            - name: PATRONI_SUPERUSER_USERNAME
              value: postgres
            - name: PATRONI_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patroni-cluster.fullname" . }}-credentials
                  key: POSTGRES_PASSWORD
            # Replication user
            - name: PATRONI_REPLICATION_USERNAME
              value: replicator
            - name: PATRONI_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patroni-cluster.fullname" . }}-credentials
                  key: REPLICATION_PASSWORD
            # PostgreSQL parameters
            - name: PATRONI_POSTGRESQL_LISTEN
              value: "0.0.0.0:5432"
            - name: PATRONI_RESTAPI_LISTEN
              value: "0.0.0.0:8008"
            - name: PATRONI_POSTGRESQL_CONNECT_ADDRESS
              value: "$(POD_NAME).{{ include "patroni-cluster.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:5432"
            - name: PATRONI_RESTAPI_CONNECT_ADDRESS
              value: "$(POD_NAME).{{ include "patroni-cluster.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:8008"
            - name: PATRONI_NAME
              value: "$(POD_NAME)"
            - name: PATRONI_KUBERNETES_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: PATRONI_KUBERNETES_LABELS
              value: "{app.kubernetes.io/name: {{ include "patroni-cluster.name" . }}}"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8008
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 4
          volumeMounts:
            - name: pgdata
              mountPath: /home/postgres/pgdata
      volumes: []
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: pgdata
        labels:
          {{- include "patroni-cluster.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
