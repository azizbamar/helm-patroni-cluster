replicaCount: 3

image:
  repository: ghcr.io/zalando/spilo-15
  tag: "3.0-p1"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

postgresql:
  postgresPassword: "changeme"
  replicationPassword: "replicapass"
  database: "app"
  username: "appuser"
  password: "apppass"
  parameters:
    max_connections: "200"
    shared_buffers: "256MB"
    effective_cache_size: "768MB"
    wal_level: "replica"
    hot_standby: "on"
    wal_keep_size: "128MB"
    max_wal_senders: "10"
    max_replication_slots: "10"

patroni:
  scope: "patroni-cluster"
  namespace: "patroni"
  ttl: 30
  loop_wait: 10
  retry_timeout: 10
  maximum_lag_on_failover: 1048576
  bootstrap:
    dcs:
      ttl: 30
      loop_wait: 10
      retry_timeout: 10
      maximum_lag_on_failover: 1048576
      postgresql:
        use_pg_rewind: true
        use_slots: true
        parameters:
          wal_level: replica
          hot_standby: "on"
          wal_keep_size: 128
          max_wal_senders: 10
          max_replication_slots: 10

etcd:
  enabled: true
  replicaCount: 3
  image:
    repository: quay.io/coreos/etcd
    tag: "v3.5.9"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  storage:
    size: 2Gi
    storageClass: "local-path"

persistence:
  enabled: true
  storageClass: "local-path"
  size: 10Gi
  accessMode: ReadWriteOnce

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

service:
  primary:
    type: ClusterIP
    port: 5432
  replica:
    type: ClusterIP
    port: 5432
  api:
    type: ClusterIP
    port: 8008

networkPolicy:
  enabled: true
  allowedNamespaceLabels:
    - key: kubernetes.io/metadata.name
      value: default

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Disabled for single-node cluster
affinity: {}

tolerations: []
nodeSelector: {}

podSecurityContext:
  fsGroup: 999
  runAsNonRoot: true

containerSecurityContext:
  runAsUser: 999
  runAsGroup: 999
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  annotations: {}
  name: ""

metrics:
  enabled: false
  image:
    repository: prometheuscommunity/postgres-exporter
    tag: v0.13.2

extraEnv: []
