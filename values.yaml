# ──────────────────────────────────────────────
# Patroni HA Cluster – values.yaml
# ──────────────────────────────────────────────

replicaCount: 3

image:
  repository: patroni/patroni   # or use spilo: ghcr.io/zalando/spilo-15
  tag: "3.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# ──────────────────────────────────────────────
# PostgreSQL configuration
# ──────────────────────────────────────────────
postgresql:
  postgresPassword: "changeme"      # superuser password (use secret in prod)
  replicationPassword: "replicapass"
  database: "app"
  username: "appuser"
  password: "apppass"

  parameters:
    max_connections: "200"
    shared_buffers: "256MB"
    effective_cache_size: "768MB"
    wal_level: "replica"
    hot_standby: "on"
    wal_keep_size: "128MB"
    max_wal_senders: "10"
    max_replication_slots: "10"

# ──────────────────────────────────────────────
# Patroni configuration
# ──────────────────────────────────────────────
patroni:
  scope: "patroni-cluster"
  namespace: "patroni"
  ttl: 30
  loop_wait: 10
  retry_timeout: 10
  maximum_lag_on_failover: 1048576   # 1 MB

  # Bootstrap method
  bootstrap:
    dcs:
      ttl: 30
      loop_wait: 10
      retry_timeout: 10
      maximum_lag_on_failover: 1048576
      postgresql:
        use_pg_rewind: true
        use_slots: true
        parameters:
          wal_level: replica
          hot_standby: "on"
          wal_keep_size: 128
          max_wal_senders: 10
          max_replication_slots: 10

# ──────────────────────────────────────────────
# etcd (embedded, deployed as a StatefulSet)
# ──────────────────────────────────────────────
etcd:
  enabled: true
  replicaCount: 3
  image:
    repository: bitnami/etcd
    tag: "3.5.9"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  storage:
    size: 2Gi
    storageClass: ""   # use cluster default

# ──────────────────────────────────────────────
# Storage
# ──────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""     # leave empty to use cluster default (gp2/gp3 on EKS, etc.)
  size: 10Gi
  accessMode: ReadWriteOnce

# ──────────────────────────────────────────────
# Resource limits
# ──────────────────────────────────────────────
resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

# ──────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────
service:
  # Primary (read-write) endpoint
  primary:
    type: ClusterIP
    port: 5432
  # Replica (read-only) endpoint
  replica:
    type: ClusterIP
    port: 5432
  # Patroni REST API
  api:
    type: ClusterIP
    port: 8008

# ──────────────────────────────────────────────
# Networking
# ──────────────────────────────────────────────
networkPolicy:
  enabled: true
  # CIDRs allowed to connect to PostgreSQL (e.g. app pods' namespace)
  allowedNamespaceLabels:
    - kubernetes.io/metadata.name: default

# ──────────────────────────────────────────────
# Pod Disruption Budget
# ──────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ──────────────────────────────────────────────
# Affinity / Topology
# ──────────────────────────────────────────────
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - patroni-cluster
        topologyKey: kubernetes.io/hostname

tolerations: []
nodeSelector: {}

# ──────────────────────────────────────────────
# Security context
# ──────────────────────────────────────────────
podSecurityContext:
  fsGroup: 999
  runAsNonRoot: true

containerSecurityContext:
  runAsUser: 999
  runAsGroup: 999
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ──────────────────────────────────────────────
# Service Account
# ──────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ──────────────────────────────────────────────
# Monitoring
# ──────────────────────────────────────────────
metrics:
  enabled: false   # set true if Prometheus is available
  image:
    repository: prometheuscommunity/postgres-exporter
    tag: v0.13.2

# ──────────────────────────────────────────────
# Extra environment variables
# ──────────────────────────────────────────────
extraEnv: []
